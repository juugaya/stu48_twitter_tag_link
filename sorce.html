        /* ボタン */

    ]
};

const STORAGE_KEY = 'stu48-hashtag-data-v1';
let stu48Data = JSON.parse(JSON.stringify(DEFAULT_DATA));

// ===== ストレージ =====
async function loadData() {
    try {
        const result = await window.storage.get(STORAGE_KEY, true);
        if (result && result.value) {
            const parsed = JSON.parse(result.value);
            for (const gen of Object.keys(DEFAULT_DATA)) {
                if (parsed[gen] && Array.isArray(parsed[gen])) {
                    stu48Data[gen] = parsed[gen];
                }
            }
        }
    } catch (e) { /* 未保存 → デフォルトのまま */ }
}

    


// ===== 投稿タブ =====
const generationSelect = document.getElementById('generationSelect');
const memberSelect     = document.getElementById('memberSelect');
const tagCheckboxes    = document.getElementById('tagCheckboxes');
const postBody         = document.getElementById('postBody');
const charCount        = document.getElementById('charCount');
const previewBox       = document.getElementById('previewBox');
const copyButton       = document.getElementById('copyButton');
const tweetButton      = document.getElementById('tweetButton');

const GEN_TAG = {
    '1st':'#STU48_1期生','draft3rd':'#STU48_ドラフト3期生',
    '2nd':'#STU48_2期生','2.5th':'#STU48_2_5期生',
    '3rd':'#STU48_3期生','4th':'#STU48_4期生'
};

function getCandidateTags() {
    const gen = generationSelect.value;
    const mem = memberSelect.value;
    let tags = ['#STU48'];
    if (gen) {
        if (GEN_TAG[gen]) tags.push(GEN_TAG[gen]);
        if (mem) {
            const found = stu48Data[gen]?.find(m => m.name === mem);
            if (found) tags = tags.concat(found.hashtags);
        }
    }
    return [...new Set(tags)];
}

function renderTagCheckboxes(tags) {
    tagCheckboxes.innerHTML = '';
    if (!tags.length) {
        tagCheckboxes.innerHTML = '<span class="tag-placeholder">期生・メンバーを選択するとタグが表示されます</span>';
    } else {
        tags.forEach(tag => {
            const chip = document.createElement('label');
            chip.className = 'tag-chip';
            const cb = document.createElement('input');
            cb.type = 'checkbox'; cb.value = tag; cb.checked = true;
            cb.addEventListener('change', updatePreview);
            const span = document.createElement('span');
            span.textContent = tag;
            chip.appendChild(cb); chip.appendChild(span);
            tagCheckboxes.appendChild(chip);
        });
    }
    updatePreview();
}

    
function getSelectedTags() {
    return [...tagCheckboxes.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value);
}

function buildPostText() {
    const body = postBody.value.trim();
    const tags = getSelectedTags().join(' ');
    if (body && tags) return body + '\n' + tags;
    return body || tags;
}

function updatePreview() {
    const text = buildPostText();
    if (text) {
        previewBox.textContent = text;
    } else {
        previewBox.innerHTML = '<span class="preview-placeholder">（プレビューなし）</span>';
    }
    const len = [...text].length;
    charCount.textContent = `${len} / 140文字`;
    charCount.classList.toggle('over', len > 140);
    tweetButton.disabled = len > 140 || len === 0;
}

function rebuildMemberSelect(gen) {
    memberSelect.innerHTML = '<option value="">メンバーを選択</option>';
    memberSelect.disabled = true;
    if (gen && stu48Data[gen]) {
        stu48Data[gen].forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.name; opt.textContent = m.name;
            memberSelect.appendChild(opt);
        });
        memberSelect.disabled = false;
    }
}

generationSelect.addEventListener('change', () => {
    rebuildMemberSelect(generationSelect.value);
    renderTagCheckboxes(getCandidateTags());
});
memberSelect.addEventListener('change', () => renderTagCheckboxes(getCandidateTags()));
postBody.addEventListener('input', updatePreview);

copyButton.addEventListener('click', () => {
    const tags = getSelectedTags().join(' ');
    if (!tags) { alert('選択されたタグがありません。'); return; }
    try {
        navigator.clipboard.writeText(tags);
    } catch {
        const tmp = document.createElement('textarea');
        tmp.value = tags; document.body.appendChild(tmp);
        tmp.select(); document.execCommand('copy'); document.body.removeChild(tmp);
    }
    alert('タグをコピーしました！');
});

tweetButton.addEventListener('click', () => {
    const text = buildPostText();
    if (!text) return;
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank', 'noopener,noreferrer');
});

// ===== 編集タブ =====
const editGenSelect  = document.getElementById('editGenSelect');
const memberEditList = document.getElementById('memberEditList');
const editButtons    = document.getElementById('editButtons');
const saveTagsBtn    = document.getElementById('saveTagsBtn');
const resetTagsBtn   = document.getElementById('resetTagsBtn');
const saveStatus     = document.getElementById('saveStatus');

function renderEditList(gen) {
    memberEditList.innerHTML = '';
    saveStatus.textContent = '';
    if (!gen || !stu48Data[gen]) { editButtons.style.display = 'none'; return; }

    const title = document.createElement('div');
    title.className = 'edit-section-title';
    title.textContent = 'メンバーのハッシュタグを編集';
    memberEditList.appendChild(title);

    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = '# を含めてスペース区切りで入力　例: #石田千穂 #ちほ　※変更は「保存する」を押すと全員に反映されます';
    memberEditList.appendChild(hint);

    stu48Data[gen].forEach((member, idx) => {
        const row = document.createElement('div');
        row.className = 'member-edit-row';

        const nameEl = document.createElement('div');
        nameEl.className = 'member-name';
        nameEl.textContent = member.name;

        const ta = document.createElement('textarea');
        ta.value = member.hashtags.join(' ');
        ta.rows = 2;
        ta.dataset.idx = idx;
        ta.placeholder = '#タグ1 #タグ2';

        row.appendChild(nameEl);
        row.appendChild(ta);
        memberEditList.appendChild(row);
    });

    editButtons.style.display = 'flex';
}

editGenSelect.addEventListener('change', () => renderEditList(editGenSelect.value));

saveTagsBtn.addEventListener('click', async () => {
    const gen = editGenSelect.value;
    if (!gen) return;

    const textareas = memberEditList.querySelectorAll('textarea[data-idx]');
    let hasError = false;

    textareas.forEach(ta => {
        const tags = ta.value.trim().split(/\s+/).filter(t => t.length > 0);
        const invalid = tags.filter(t => !t.startsWith('#'));
        ta.classList.toggle('error', invalid.length > 0);
        if (invalid.length > 0) {
            hasError = true;
        } else {
            stu48Data[gen][parseInt(ta.dataset.idx)].hashtags = tags.length ? tags : [];
        }
    });

    if (hasError) {
        setStatus('⚠️ # で始まらないタグがあります（赤枠の欄を確認）', 'err');
        return;
    }

    try {
        setStatus('💾 保存中…', '');
        await saveData();
        setStatus('✅ 保存しました！みんなに反映されます。', 'ok');
        // 投稿タブにも即時反映
        const curGen = generationSelect.value;
        if (curGen === gen) {
            const curMem = memberSelect.value;
            rebuildMemberSelect(gen);
            memberSelect.value = curMem;
            renderTagCheckboxes(getCandidateTags());
        }
    } catch (e) {
        setStatus('❌ 保存に失敗しました。', 'err');
    }
});

resetTagsBtn.addEventListener('click', async () => {
    const gen = editGenSelect.value;
    if (!gen) return;
    const label = editGenSelect.options[editGenSelect.selectedIndex].text;
    if (!confirm(`「${label}」のタグを初期値に戻しますか？\nこの操作は全員に反映されます。`)) return;
    stu48Data[gen] = JSON.parse(JSON.stringify(DEFAULT_DATA[gen]));
    try {
        await saveData();
        renderEditList(gen);
        setStatus('✅ 初期値に戻しました。', 'ok');
    } catch (e) {
        setStatus('❌ 保存に失敗しました。', 'err');
    }
});

function setStatus(msg, type) {
    saveStatus.textContent = msg;
    saveStatus.className = 'status-msg ' + type;
    if (type === 'ok') setTimeout(() => { saveStatus.textContent = ''; saveStatus.className = 'status-msg'; }, 4000);
}

// ===== タブ切り替え =====
let editInitialized = false;
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');

        if (tab.dataset.tab === 'edit' && !editInitialized) {
            editInitialized = true;
            document.getElementById('editLoading').style.display = 'none';
            document.getElementById('editContent').style.display = 'block';
        }
    });
});

const WORKER_URL = "https://weathered-dream-9afgist-proxy.ogamcad.workers.dev/";

// 保存処理（新規 or 更新）
async function saveData() {
  const gistId = document.getElementById("gistIdInput").value.trim();

  // あなたのアプリのデータを取得
  const content = collectAppData();

  const payload = {
    method: gistId ? "update" : "create",
    gist_id: gistId || undefined,
    files: {
      "data.json": {
        content: JSON.stringify(content, null, 2)
      }
    }
  };

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.id) {
    document.getElementById("gistIdInput").value = data.id;
    document.getElementById("status").innerText = "保存完了: " + data.html_url;
  } else {
    document.getElementById("status").innerText = "保存エラー: " + JSON.stringify(data);
  }
}

// 読み込み処理
async function loadData() {
  const gistId = document.getElementById("gistIdInput").value.trim();
  if (!gistId) {
    alert("Gist ID を入力してください");
    return;
  }

  const res = await fetch(`${WORKER_URL}?gist_id=${gistId}`);
  const data = await res.json();

  if (!data.files || !data.files["data.json"]) {
    document.getElementById("status").innerText = "読み込みエラー";
    return;
  }

  const content = JSON.parse(data.files["data.json"].content);

  applyAppData(content);

  document.getElementById("status").innerText = "読み込み完了";
}

// ===== 初期化 =====
(async () => {
    await loadData();
    renderTagCheckboxes([]);
})();
</script>
