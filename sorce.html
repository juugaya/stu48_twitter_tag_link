<script>
// ===== デフォルトデータ =====
const DEFAULT_DATA = { /* そのまま */ };

const STORAGE_KEY = 'stu48-hashtag-data-v1';
let stu48Data = structuredClone(DEFAULT_DATA);

// ===== ストレージ =====
function loadData() {
    try {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!data) return;

        Object.keys(DEFAULT_DATA).forEach(gen => {
            if (data[gen]) stu48Data[gen] = data[gen];
        });
    } catch {}
}

function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stu48Data));
}

// ===== DOM =====
const generationSelect = document.getElementById('generationSelect');
const memberSelect     = document.getElementById('memberSelect');
const tagCheckboxes    = document.getElementById('tagCheckboxes');
const postBody         = document.getElementById('postBody');
const charCount        = document.getElementById('charCount');
const previewBox       = document.getElementById('previewBox');
const copyButton       = document.getElementById('copyButton');
const tweetButton      = document.getElementById('tweetButton');

const GEN_TAG = {
    '1st': '#STU48_1期生',
    'draft3rd': '#STU48_ドラフト3期生',
    '2nd': '#STU48_2期生',
    '2.5th': '#STU48_2_5期生',
    '3rd': '#STU48_3期生',
    '4th': '#STU48_4期生'
};

// ===== タグ生成 =====
function getCandidateTags() {
    const gen = generationSelect.value;
    const mem = memberSelect.value;

    const tags = ['#STU48'];

    if (gen) {
        if (GEN_TAG[gen]) tags.push(GEN_TAG[gen]);

        if (mem) {
            const found = stu48Data[gen]?.find(m => m.name === mem);
            if (found) tags.push(...found.hashtags);
        }
    }

    return [...new Set(tags)];
}

function renderTagCheckboxes(tags) {
    tagCheckboxes.innerHTML = '';

    if (!tags.length) {
        tagCheckboxes.innerHTML =
            '<span class="tag-placeholder">期生・メンバーを選択するとタグが表示されます</span>';
        return;
    }

    tags.forEach(tag => {
        const label = document.createElement('label');
        label.className = 'tag-chip';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = tag;
        cb.checked = true;
        cb.addEventListener('change', updatePreview);

        const span = document.createElement('span');
        span.textContent = tag;

        label.append(cb, span);
        tagCheckboxes.appendChild(label);
    });
}

function getSelectedTags() {
    return [...tagCheckboxes.querySelectorAll('input:checked')]
        .map(cb => cb.value);
}

// ===== 投稿生成 =====
function buildPostText() {
    const body = postBody.value.trim();
    const tags = getSelectedTags().join(' ');

    if (body && tags) return `${body}\n${tags}`;
    return body || tags;
}

function updatePreview() {
    const text = buildPostText();
    const len  = text.length;

    previewBox.textContent = text || '（プレビューなし）';

    charCount.textContent = `${len} / 140文字`;
    charCount.classList.toggle('over', len > 140);

    tweetButton.disabled = len === 0 || len > 140;
}

// ===== セレクト =====
function rebuildMemberSelect(gen) {
    memberSelect.innerHTML = '<option value="">メンバーを選択</option>';
    memberSelect.disabled = true;

    if (!gen || !stu48Data[gen]) return;

    stu48Data[gen].forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.name;
        opt.textContent = m.name;
        memberSelect.appendChild(opt);
    });

    memberSelect.disabled = false;
}

// ===== イベント =====
generationSelect.addEventListener('change', () => {
    rebuildMemberSelect(generationSelect.value);
    renderTagCheckboxes(getCandidateTags());
    updatePreview();
});

memberSelect.addEventListener('change', () => {
    renderTagCheckboxes(getCandidateTags());
    updatePreview();
});

postBody.addEventListener('input', updatePreview);

copyButton.addEventListener('click', () => {
    const tags = getSelectedTags().join(' ');
    if (!tags) return alert('タグがありません');

    navigator.clipboard.writeText(tags);
    alert('コピーしました');
});

tweetButton.addEventListener('click', () => {
    const text = buildPostText();
    if (!text) return;

    window.open(
        'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text),
        '_blank'
    );
});

// ===== 編集タブ =====
const editGenSelect  = document.getElementById('editGenSelect');
const memberEditList = document.getElementById('memberEditList');
const editButtons    = document.getElementById('editButtons');
const saveTagsBtn    = document.getElementById('saveTagsBtn');
const resetTagsBtn   = document.getElementById('resetTagsBtn');
const saveStatus     = document.getElementById('saveStatus');

function renderEditList(gen) {
    memberEditList.innerHTML = '';
    saveStatus.textContent = '';

    if (!gen || !stu48Data[gen]) {
        editButtons.style.display = 'none';
        return;
    }

    stu48Data[gen].forEach((m, i) => {
        const row = document.createElement('div');
        row.className = 'member-edit-row';

        const name = document.createElement('div');
        name.className = 'member-name';
        name.textContent = m.name;

        const ta = document.createElement('textarea');
        ta.value = m.hashtags.join(' ');
        ta.dataset.idx = i;

        row.append(name, ta);
        memberEditList.appendChild(row);
    });

    editButtons.style.display = 'flex';
}

editGenSelect.addEventListener('change', () =>
    renderEditList(editGenSelect.value)
);

saveTagsBtn.addEventListener('click', () => {
    const gen = editGenSelect.value;
    if (!gen) return;

    memberEditList.querySelectorAll('textarea').forEach(ta => {
        stu48Data[gen][ta.dataset.idx].hashtags =
            ta.value.trim().split(/\s+/);
    });

    saveData();
    saveStatus.textContent = '保存しました';
});

resetTagsBtn.addEventListener('click', () => {
    const gen = editGenSelect.value;
    if (!gen) return;

    stu48Data[gen] = structuredClone(DEFAULT_DATA[gen]);
    saveData();
    renderEditList(gen);
});

// ===== タブ =====
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab, .tab-content')
            .forEach(el => el.classList.remove('active'));

        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab)
            .classList.add('active');
    });
});

// ===== 初期化 =====
loadData();
renderTagCheckboxes([]);
updatePreview();
</script>
</body>
</html>
